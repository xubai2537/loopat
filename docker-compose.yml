services:
  loopat:
    build: .
    image: loopat:latest
    privileged: true
    ports:
      - "17787:7787"
      - "17788:7788"
    volumes:
      - loopat-data:/home/loopat/.loopat
      # - ~/.ssh:/home/loopat/.ssh:ro  # 可选：挂载 SSH 密钥用于 git 操作
    environment:
      - LOOPAT_HOME=/home/loopat/.loopat
      - HOST=0.0.0.0
      - LOOPAT_SERVE_HOST=0.0.0.0
      # Chimp Gateway SSE. Set LOOPAT_CHIMP_TOKEN in the deploy environment.
      - LOOPAT_CHIMP_TOKEN=${LOOPAT_CHIMP_TOKEN:?set LOOPAT_CHIMP_TOKEN}
      - LOOPAT_CHIMP_USER=chimpmate
      - LOOPAT_CHIMP_MOCK_ENABLED=false
    restart: unless-stopped

volumes:
  loopat-data:
