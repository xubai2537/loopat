<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="aGreen" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="aOrange" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="aPurple" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="aMuted" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="580" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">loopat context flow</text>
  <text x="40" y="74" font-size="14" fill="#6b7280">loops exchange context with a remote over two edges</text>

  <!-- legend (vertical, top-right) -->
  <g font-size="12" fill="#374151">
    <circle cx="706" cy="32" r="5" fill="#16a34a" stroke="#ffffff" stroke-width="1.5"/>
    <text x="720" y="36">commit</text>

    <line x1="700" y1="58" x2="736" y2="58" stroke="#16a34a" stroke-width="3"/>
    <text x="744" y="62">① pull / ② promote</text>

    <line x1="700" y1="84" x2="736" y2="84" stroke="#2563eb" stroke-width="3"/>
    <text x="744" y="88">direct merge (notes · personal)</text>

    <line x1="700" y1="110" x2="730" y2="110" stroke="#7c3aed" stroke-width="3" stroke-dasharray="6 4"/>
    <g transform="translate(741,110)">
      <rect x="-5" y="-5" width="11" height="9" rx="2" fill="none" stroke="#7c3aed" stroke-width="1.8"/>
      <path d="M-2.5,-5 v-2 a2.5,2.5 0 0 1 5,0 v2" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    </g>
    <text x="752" y="114">PR-gated (knowledge · repos)</text>
  </g>

  <!-- lane labels -->
  <g font-size="13" fill="#111827">
    <text x="24" y="186" font-weight="700" fill="#2563eb">origin / main</text>
    <text x="24" y="202" font-size="11" fill="#6b7280">team consensus</text>

    <text x="24" y="304" font-weight="700" fill="#16a34a">loop · feat-x</text>
    <text x="24" y="320" font-size="11" fill="#6b7280">worktree</text>

    <text x="24" y="394" font-weight="700" fill="#ea580c">loop · feat-y</text>
    <text x="24" y="410" font-size="11" fill="#6b7280">worktree</text>

    <text x="24" y="494" font-weight="700" fill="#7c3aed">distill loop</text>
    <text x="24" y="510" font-size="11" fill="#6b7280">notes → knowledge</text>
  </g>

  <!-- consensus trunk -->
  <line x1="165" y1="190" x2="912" y2="190" stroke="#2563eb" stroke-width="3.5"/>
  <g fill="#2563eb" stroke="#ffffff" stroke-width="1.5">
    <circle cx="180" cy="190" r="5.5"/>
    <circle cx="230" cy="190" r="5.5"/>
    <circle cx="400" cy="190" r="5.5"/>
    <circle cx="470" cy="190" r="5.5"/>
    <circle cx="680" cy="190" r="5.5"/>
    <circle cx="700" cy="190" r="5.5"/>
    <circle cx="890" cy="190" r="5.5"/>
  </g>

  <!-- loop A: feat-x (green) -->
  <path d="M230,190 C 240,236 250,258 258,300" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <path d="M447,300 C 455,258 462,234 470,194" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <line x1="258" y1="300" x2="447" y2="300" stroke="#16a34a" stroke-width="3"/>
  <g fill="#16a34a" stroke="#ffffff" stroke-width="1.5">
    <circle cx="292" cy="300" r="5"/>
    <circle cx="360" cy="300" r="5"/>
    <circle cx="425" cy="300" r="5"/>
  </g>
  <text x="214" y="252" font-size="13" font-weight="700" fill="#16a34a">①</text>
  <text x="476" y="252" font-size="13" font-weight="700" fill="#16a34a">②</text>

  <!-- loop B: feat-y (orange) -->
  <path d="M400,190 C 410,270 420,324 428,390" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#aOrange)"/>
  <path d="M652,390 C 660,324 672,270 680,194" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#aOrange)"/>
  <line x1="428" y1="390" x2="652" y2="390" stroke="#ea580c" stroke-width="3"/>
  <g fill="#ea580c" stroke="#ffffff" stroke-width="1.5">
    <circle cx="470" cy="390" r="5"/>
    <circle cx="540" cy="390" r="5"/>
    <circle cx="610" cy="390" r="5"/>
  </g>
  <text x="384" y="296" font-size="13" font-weight="700" fill="#ea580c">①</text>
  <text x="686" y="296" font-size="13" font-weight="700" fill="#ea580c">②</text>

  <!-- distill loop (purple, PR-gated promote) -->
  <path d="M700,190 C 710,320 720,408 728,490" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#aPurple)"/>
  <line x1="728" y1="490" x2="820" y2="490" stroke="#7c3aed" stroke-width="3"/>
  <path d="M820,490 C 840,408 856,300 890,194" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#aPurple)"/>
  <g fill="#7c3aed" stroke="#ffffff" stroke-width="1.5">
    <circle cx="756" cy="490" r="5"/>
    <circle cx="794" cy="490" r="5"/>
  </g>
  <!-- PR gate icon on the dashed promote -->
  <g transform="translate(866,330)">
    <rect x="-9" y="-7" width="18" height="15" rx="3" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
    <path d="M-5,-7 v-3 a5,5 0 0 1 10,0 v3" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <text x="16" y="4" font-size="11.5" fill="#7c3aed" font-weight="600">PR</text>
  </g>
  <text x="700" y="362" font-size="13" font-weight="700" fill="#7c3aed">①</text>
  <text x="898" y="288" font-size="13" font-weight="700" fill="#7c3aed">②</text>

  <!-- time axis -->
  <line x1="165" y1="544" x2="905" y2="544" stroke="#9ca3af" stroke-width="2" marker-end="url(#aMuted)"/>
  <text x="912" y="548" font-size="12.5" fill="#6b7280">time</text>

  <!-- footnote callout -->
  <text x="165" y="570" font-size="12.5" fill="#6b7280">every edge runs inside a loop, so its own AI resolves any conflict — the same two edges run solo or across a team.</text>
</svg>
