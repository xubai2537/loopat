<svg viewBox="0 0 960 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="450" fill="#ffffff"/>

  <!-- title -->
  <text x="480" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">loopat identity</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6b7280">loopat is a shell — your git platform is the real identity &amp; permission layer</text>

  <!-- ===== Card A: git platform ===== -->
  <rect x="24" y="92" width="236" height="312" rx="12" fill="#f8fafc" stroke="#e6e8ec"/>
  <text x="44" y="120" font-size="13" font-weight="700" fill="#2563eb" letter-spacing="0.5">GIT PLATFORM</text>
  <line x1="44" y1="130" x2="240" y2="130" stroke="#eceef1"/>
  <circle cx="56" cy="160" r="12" fill="#2563eb"/>
  <text x="56" y="164" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">G</text>
  <text x="76" y="156" font-size="12.5" font-weight="600" fill="#1f2937">github · gitlab</text>
  <text x="76" y="172" font-size="11.5" fill="#9ca3af">aone · bare git server</text>
  <text x="44" y="208" font-size="12" fill="#6b7280">the real source of truth for:</text>
  <text x="50" y="232" font-size="12" fill="#374151">— accounts &amp; identity</text>
  <text x="50" y="252" font-size="12" fill="#374151">— repo access</text>
  <text x="50" y="272" font-size="12" fill="#374151">— team membership</text>
  <text x="44" y="384" font-size="11" font-style="italic" fill="#9ca3af">loopat stores none of this.</text>

  <!-- arrow A -> B -->
  <line x1="262" y1="240" x2="300" y2="240" stroke="#9ca3af" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="281" y="232" text-anchor="middle" font-size="9" fill="#9ca3af">authorize</text>

  <!-- ===== Card B: loopat shell ===== -->
  <rect x="302" y="92" width="186" height="312" rx="12" fill="#f8fafc" stroke="#e6e8ec"/>
  <text x="322" y="120" font-size="13" font-weight="700" fill="#ea580c" letter-spacing="0.5">loopat</text>
  <text x="468" y="120" text-anchor="end" font-size="9" fill="#9ca3af" letter-spacing="0.5">THE SHELL</text>
  <line x1="322" y1="130" x2="468" y2="130" stroke="#eceef1"/>
  <circle cx="334" cy="160" r="12" fill="#ea580c"/>
  <text x="334" y="164" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">L</text>
  <text x="354" y="164" font-size="12.5" font-weight="600" fill="#1f2937">account ≈ empty</text>
  <text x="322" y="206" font-size="12" fill="#6b7280">it holds only:</text>
  <text x="328" y="232" font-size="12.5" fill="#374151">① a pointer →</text>
  <text x="344" y="250" font-size="11.5" font-family="ui-monospace, monospace" fill="#7c3aed">personal/&lt;user&gt;</text>
  <text x="328" y="284" font-size="12.5" fill="#374151">② the git-crypt key</text>
  <text x="344" y="302" font-size="11.5" fill="#9ca3af">unlocks the vault</text>
  <text x="322" y="384" font-size="11" font-style="italic" fill="#9ca3af">a pointer + one key.</text>

  <!-- arrow B -> C -->
  <line x1="490" y1="240" x2="524" y2="240" stroke="#9ca3af" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- ===== Card C: credential chain ===== -->
  <rect x="526" y="92" width="410" height="312" rx="12" fill="#f8fafc" stroke="#e6e8ec"/>
  <text x="546" y="120" font-size="13" font-weight="700" fill="#0f766e" letter-spacing="0.5">CREDENTIAL CHAIN</text>
  <text x="916" y="120" text-anchor="end" font-size="9" fill="#9ca3af" letter-spacing="0.5">BOOTSTRAP → RUNTIME</text>
  <line x1="546" y1="130" x2="916" y2="130" stroke="#eceef1"/>

  <!-- link 1: deploy key -->
  <circle cx="560" cy="166" r="13" fill="#7c3aed"/>
  <text x="560" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="584" y="162" font-size="13" font-weight="600" fill="#1f2937">deploy key</text>
  <text x="584" y="178" font-size="11.5" fill="#9ca3af">host-side · outside personal · clone personal (bootstrap)</text>
  <text x="916" y="166" text-anchor="end" font-size="10" fill="#b91c1c">✗ sandbox</text>

  <line x1="560" y1="184" x2="560" y2="216" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- link 2: git-crypt key -->
  <circle cx="560" cy="236" r="13" fill="#d97706"/>
  <text x="560" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="584" y="232" font-size="13" font-weight="600" fill="#1f2937">git-crypt key</text>
  <text x="584" y="248" font-size="11.5" fill="#9ca3af">decrypts the vault inside personal</text>
  <text x="916" y="236" text-anchor="end" font-size="10" fill="#b91c1c">✗ sandbox</text>

  <line x1="560" y1="254" x2="560" y2="286" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- link 3: vault creds -->
  <circle cx="560" cy="306" r="13" fill="#16a34a"/>
  <text x="560" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="584" y="302" font-size="13" font-weight="600" fill="#1f2937">vault credentials</text>
  <text x="584" y="318" font-size="11.5" fill="#9ca3af">your own git key · every pull/push (runtime)</text>
  <text x="916" y="306" text-anchor="end" font-size="10" fill="#16a34a">✓ sandbox</text>

  <!-- runtime targets -->
  <line x1="546" y1="344" x2="916" y2="344" stroke="#eceef1"/>
  <text x="546" y="368" font-size="11.5" fill="#6b7280">every repo runs as you, against its own origin:</text>
  <text x="546" y="388" font-size="12" font-weight="600" fill="#0f766e">personal · notes · knowledge · repos</text>

  <!-- bottom note -->
  <text x="480" y="436" text-anchor="middle" font-size="12" fill="#6b7280">one authorization sets it all up — loopat generates the keys, the platform registers them · solo vs team = just the origin address</text>
</svg>
