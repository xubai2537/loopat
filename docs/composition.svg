<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1280 820" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">loopat .claude composition</title>
  <desc id="d">Five .claude tiers stacked with strongest (last-wins) at top. Workspace, profiles and personal are merged by loopat into the loop's user tier. Workdir (project + local) is read by the SDK directly. Inside the sandbox the SDK sees two .claude sources of truth plus the wholesale-bound plugin cache.</desc>

  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b5bdb"/></marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9333ea"/></marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/></marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d97706"/></marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7e8794"/></marker>
    <marker id="arr-up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="9" markerHeight="9" orient="auto"><path d="M0,10 L10,10 L5,0 z" fill="#5b6776"/></marker>

    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── TITLE ─────────────────────────────────────────────────────── -->
  <text x="640" y="44" text-anchor="middle" font-size="32" font-weight="700" letter-spacing="-0.5" fill="#1c2733">.claude composition</text>
  <text x="640" y="74" text-anchor="middle" font-size="14" fill="#5b6776">five host-side tiers · merged into one loop · read by the SDK as user + project + local</text>

  <!-- ══════════════════════════════════════════════════════════════════
       LEFT CARD — SOURCES, top = strongest (last-wins)
  ══════════════════════════════════════════════════════════════════ -->
  <g filter="url(#soft)">
    <rect x="60" y="110" width="370" height="660" rx="14" fill="#ffffff" stroke="#d8dde4" stroke-width="1"/>
  </g>
  <rect x="60" y="110" width="370" height="40" rx="14" fill="#eef2f7"/>
  <rect x="60" y="136" width="370" height="14" fill="#eef2f7"/>
  <text x="80" y="136" font-size="13" font-weight="700" fill="#5b6776" letter-spacing="2">SOURCES</text>
  <text x="410" y="136" font-size="11" text-anchor="end" fill="#7e8794" letter-spacing="1">TOP = LAST-WINS</text>

  <!-- vertical override arrow on right edge of card — points UP -->
  <line x1="395" y1="700" x2="395" y2="175" stroke="#5b6776" stroke-width="1.5" marker-end="url(#arr-up)"/>
  <text x="408" y="437" font-size="10" fill="#5b6776" font-style="italic" letter-spacing="0.5">
    <tspan x="408" dy="-90">o</tspan>
    <tspan x="408" dy="12">v</tspan>
    <tspan x="408" dy="12">e</tspan>
    <tspan x="408" dy="12">r</tspan>
    <tspan x="408" dy="12">r</tspan>
    <tspan x="408" dy="12">i</tspan>
    <tspan x="408" dy="12">d</tspan>
    <tspan x="408" dy="12">e</tspan>
    <tspan x="408" dy="12">s</tspan>
  </text>

  <!-- ──── GROUP B (top) — read directly by SDK ──── -->
  <text x="80" y="180" font-size="10" font-weight="700" fill="#16a34a" letter-spacing="1">READ DIRECTLY BY SDK</text>

  <!-- LOCAL tier — strongest -->
  <g>
    <circle cx="92" cy="208" r="14" fill="#16a34a" opacity="0.55"/>
    <text x="92" y="213" text-anchor="middle" font-size="11" font-weight="700" fill="white">L</text>
    <text x="115" y="206" font-size="14" font-weight="600" fill="#1c2733">local</text>
    <text x="115" y="221" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">workdir/.claude/*.local.*</text>
    <text x="115" y="234" font-size="10" fill="#7e8794" font-style="italic">per-checkout · not committed</text>
  </g>

  <!-- PROJECT (workdir) tier -->
  <g>
    <circle cx="92" cy="262" r="14" fill="#16a34a"/>
    <text x="92" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="white">W</text>
    <text x="115" y="260" font-size="14" font-weight="600" fill="#1c2733">project (workdir)</text>
    <text x="115" y="275" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">workdir/.claude/</text>
    <text x="115" y="288" font-size="10" fill="#7e8794" font-style="italic">repo-native · per repo</text>
  </g>

  <!-- divider between SDK-direct and loopat-merged -->
  <line x1="80" y1="312" x2="380" y2="312" stroke="#e0e4ea" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ──── GROUP A (bottom) — merged by loopat into user tier ──── -->
  <text x="80" y="335" font-size="10" font-weight="700" fill="#9333ea" letter-spacing="1">MERGED BY LOOPAT → USER TIER</text>

  <!-- PERSONAL — strongest of the merged group -->
  <g>
    <circle cx="92" cy="363" r="14" fill="#9333ea"/>
    <text x="92" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="white">P</text>
    <text x="115" y="361" font-size="14" font-weight="600" fill="#1c2733">personal</text>
    <text x="115" y="376" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">personal/&lt;user&gt;/.loopat/.claude/</text>
    <text x="115" y="389" font-size="10" fill="#7e8794" font-style="italic">per-user · last word on user tier</text>
  </g>

  <!-- PROFILE N -->
  <g>
    <circle cx="92" cy="417" r="14" fill="#9333ea"/>
    <text x="92" y="422" text-anchor="middle" font-size="10" font-weight="700" fill="white">P<tspan font-size="8" baseline-shift="sub">N</tspan></text>
    <text x="115" y="415" font-size="14" font-weight="600" fill="#1c2733">profile N</text>
    <text x="115" y="430" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">knowledge/.loopat/profiles/…/.claude/</text>
    <text x="115" y="443" font-size="10" fill="#7e8794" font-style="italic">opt-in bundles (role / mode)</text>
  </g>

  <!-- profile ellipsis -->
  <text x="92" y="470" text-anchor="middle" font-size="20" fill="#9333ea" font-weight="700">⋮</text>
  <text x="115" y="467" font-size="11" fill="#7e8794" font-style="italic">0..N profiles selected at loop creation</text>

  <!-- PROFILE 1 -->
  <g>
    <circle cx="92" cy="498" r="14" fill="#9333ea"/>
    <text x="92" y="503" text-anchor="middle" font-size="10" font-weight="700" fill="white">P<tspan font-size="8" baseline-shift="sub">1</tspan></text>
    <text x="115" y="496" font-size="14" font-weight="600" fill="#1c2733">profile 1</text>
    <text x="115" y="511" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">knowledge/.loopat/profiles/…/.claude/</text>
  </g>

  <!-- WORKSPACE — weakest -->
  <g>
    <circle cx="92" cy="551" r="14" fill="#3b5bdb"/>
    <text x="92" y="556" text-anchor="middle" font-size="11" font-weight="700" fill="white">T</text>
    <text x="115" y="549" font-size="14" font-weight="600" fill="#1c2733">workspace</text>
    <text x="115" y="564" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">knowledge/.loopat/.claude/</text>
    <text x="115" y="577" font-size="10" fill="#7e8794" font-style="italic">always on · whole team</text>
  </g>

  <!-- legend at bottom -->
  <rect x="80" y="608" width="300" height="148" rx="6" fill="#fafbfd" stroke="#e8ecf2"/>
  <text x="92" y="626" font-size="10" font-weight="700" fill="#5b6776" letter-spacing="1">EACH .claude/ MAY CONTAIN</text>
  <text x="92" y="644" font-size="11" font-family="ui-monospace, monospace" fill="#1c2733">settings.json</text>
  <text x="220" y="644" font-size="10" fill="#7e8794">— enabledPlugins · mcpServers · hooks</text>
  <text x="92" y="660" font-size="11" font-family="ui-monospace, monospace" fill="#1c2733">CLAUDE.md</text>
  <text x="220" y="660" font-size="10" fill="#7e8794">— always-on doctrine</text>
  <text x="92" y="676" font-size="11" font-family="ui-monospace, monospace" fill="#1c2733">skills/</text>
  <text x="220" y="676" font-size="10" fill="#7e8794">— /command procedures</text>
  <text x="92" y="692" font-size="11" font-family="ui-monospace, monospace" fill="#1c2733">agents/</text>
  <text x="220" y="692" font-size="10" fill="#7e8794">— subagent prompts</text>
  <text x="92" y="708" font-size="11" font-family="ui-monospace, monospace" fill="#1c2733">mise.toml</text>
  <text x="220" y="708" font-size="10" fill="#7e8794">— toolchain pins (loopat ext.)</text>
  <text x="92" y="724" font-size="11" font-family="ui-monospace, monospace" fill="#1c2733">…</text>
  <text x="220" y="724" font-size="10" fill="#7e8794">— any future CC .claude/ field</text>
  <text x="92" y="746" font-size="10" fill="#9ba3ad" font-style="italic">All keys deep-merge per-key, last-wins.</text>

  <!-- ══════════════════════════════════════════════════════════════════
       CENTER — COMPOSE step (with merge rules INSIDE the card)
  ══════════════════════════════════════════════════════════════════ -->

  <!-- arrows from merged-tier group → compose -->
  <g fill="none" stroke="#9333ea" stroke-width="1.6">
    <path d="M 380 363 C 425 363, 440 440, 478 460" marker-end="url(#arr-purple)"/>
    <path d="M 380 417 C 425 417, 440 450, 478 463" marker-end="url(#arr-purple)"/>
    <path d="M 380 498 C 425 498, 440 472, 478 467" marker-end="url(#arr-purple)"/>
  </g>
  <g fill="none" stroke="#3b5bdb" stroke-width="1.6">
    <path d="M 380 551 C 425 551, 445 480, 478 471" marker-end="url(#arr-blue)"/>
  </g>

  <!-- compose card with merge rules inside -->
  <g filter="url(#soft)">
    <rect x="478" y="425" width="252" height="220" rx="10" fill="#fff8ec" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <text x="604" y="453" text-anchor="middle" font-size="15" font-weight="700" fill="#d97706">compose</text>
  <text x="604" y="471" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#a16207">server/src/compose.ts</text>

  <line x1="490" y1="485" x2="718" y2="485" stroke="#f7d997" stroke-width="1"/>
  <text x="490" y="503" font-size="11" font-weight="700" fill="#a16207" letter-spacing="0.5">MERGE RULES</text>

  <g font-size="10" fill="#5b6776">
    <text x="490" y="521"><tspan font-family="ui-monospace, monospace" fill="#1c2733">settings.json</tspan></text>
    <text x="490" y="534" fill="#7e8794">  shallow key union; sub-keys last-wins</text>
    <text x="490" y="552"><tspan font-family="ui-monospace, monospace" fill="#1c2733">CLAUDE.md</tspan></text>
    <text x="490" y="565" fill="#7e8794">  concat in tier order, ## headers</text>
    <text x="490" y="583"><tspan font-family="ui-monospace, monospace" fill="#1c2733">skills/, agents/</tspan></text>
    <text x="490" y="596" fill="#7e8794">  symlink union, last-wins per name</text>
    <text x="490" y="614"><tspan font-family="ui-monospace, monospace" fill="#1c2733">mise.toml</tspan></text>
    <text x="490" y="627" fill="#7e8794">  TOML [tools]/[env] table union</text>
  </g>

  <!-- arrow compose → user tier box -->
  <g fill="none" stroke="#d97706" stroke-width="2">
    <path d="M 730 535 L 778 535" marker-end="url(#arr-orange)"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════════════
       RIGHT — SANDBOX VIEW
  ══════════════════════════════════════════════════════════════════ -->
  <g filter="url(#soft)">
    <rect x="780" y="110" width="450" height="660" rx="14" fill="#ffffff" stroke="#d8dde4" stroke-width="1"/>
  </g>
  <rect x="780" y="110" width="450" height="40" rx="14" fill="#eef2f7"/>
  <rect x="780" y="136" width="450" height="14" fill="#eef2f7"/>
  <text x="800" y="136" font-size="13" font-weight="700" fill="#5b6776" letter-spacing="2">SANDBOX VIEW</text>
  <text x="1210" y="136" font-size="11" text-anchor="end" fill="#7e8794" letter-spacing="1">PER-LOOP · ISOLATED</text>

  <!-- SDK badge (top-right) -->
  <g>
    <rect x="1138" y="180" width="80" height="56" rx="6" fill="#eaf3ff" stroke="#3b5bdb"/>
    <text x="1178" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#3b5bdb">SDK</text>
    <text x="1178" y="216" text-anchor="middle" font-size="8" fill="#5b6776">settingSources</text>
    <text x="1178" y="228" text-anchor="middle" font-size="8" font-family="ui-monospace, monospace" fill="#5b6776">[u,p,l]</text>
  </g>

  <!-- USER TIER — composed by loopat -->
  <g>
    <rect x="800" y="180" width="320" height="200" rx="8" fill="#fafbfd" stroke="#3b5bdb" stroke-width="1.5"/>
    <text x="816" y="202" font-size="13" font-weight="700" fill="#3b5bdb">user tier (loopat-composed)</text>
    <text x="816" y="218" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">loops/&lt;id&gt;/.claude/</text>
    <text x="816" y="232" font-size="10" fill="#7e8794" font-style="italic">SDK env: CLAUDE_CONFIG_DIR</text>
    <g font-size="11" font-family="ui-monospace, monospace" fill="#1c2733">
      <text x="816" y="260">├── settings.json</text>
      <text x="816" y="276">├── CLAUDE.md</text>
      <text x="816" y="292">├── skills/        → symlinks</text>
      <text x="816" y="308">├── agents/        → symlinks</text>
      <text x="816" y="324">├── mise.toml</text>
      <text x="816" y="340">└── mise.lock</text>
    </g>
  </g>

  <!-- PROJECT + LOCAL tier — read directly by SDK -->
  <g>
    <rect x="800" y="408" width="320" height="156" rx="8" fill="#fafbfd" stroke="#16a34a" stroke-width="1.5"/>
    <text x="816" y="430" font-size="13" font-weight="700" fill="#16a34a">project + local tier</text>
    <text x="816" y="446" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">workdir/.claude/   (= cwd)</text>
    <text x="816" y="460" font-size="10" fill="#7e8794" font-style="italic">read directly by SDK, not merged</text>
    <g font-size="11" font-family="ui-monospace, monospace" fill="#1c2733">
      <text x="816" y="488">├── settings.json</text>
      <text x="816" y="504">├── settings.local.json   (local tier)</text>
      <text x="816" y="520">├── CLAUDE.md</text>
      <text x="816" y="536">└── skills/   ·   agents/   ·   …</text>
    </g>
  </g>

  <!-- PLUGIN CACHE — wholesale bind -->
  <g>
    <rect x="800" y="592" width="320" height="118" rx="8" fill="#fafbfd" stroke="#9ba3ad" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="816" y="614" font-size="13" font-weight="700" fill="#5b6776">plugin cache (ro-bound wholesale)</text>
    <text x="816" y="630" font-size="10" font-family="ui-monospace, monospace" fill="#5b6776">~/.claude/plugins/</text>
    <text x="816" y="650" font-size="10" fill="#7e8794" font-style="italic">SDK resolves enabledPlugins natively from</text>
    <text x="816" y="664" font-size="10" fill="#7e8794" font-style="italic">settings.json + installed_plugins.json.</text>
    <text x="816" y="684" font-size="10" fill="#7e8794">loopat builtin is the only plugin passed</text>
    <text x="816" y="698" font-size="10" fill="#7e8794">via the <tspan font-family="ui-monospace, monospace">plugins:</tspan> SDK option.</text>
  </g>

  <!-- arrows: user tier → SDK -->
  <g fill="none" stroke="#3b5bdb" stroke-width="1.5">
    <path d="M 1120 250 L 1136 230" marker-end="url(#arr-blue)"/>
  </g>
  <!-- project/local tier → SDK -->
  <g fill="none" stroke="#16a34a" stroke-width="1.5">
    <path d="M 1120 460 C 1155 460, 1155 250, 1162 240" marker-end="url(#arr-green)"/>
  </g>
  <!-- plugin cache → SDK -->
  <g fill="none" stroke="#7e8794" stroke-width="1.4" stroke-dasharray="3 3">
    <path d="M 1120 640 C 1180 640, 1188 270, 1188 240" marker-end="url(#arr-gray)"/>
  </g>

  <!-- bottom annotation about no ~/.claude -->
  <text x="1005" y="744" text-anchor="middle" font-size="11" fill="#9ba3ad" font-style="italic">
    no host <tspan font-family="ui-monospace, monospace">~/.claude/</tspan> visible — sandbox <tspan font-family="ui-monospace, monospace">$HOME</tspan> is an overlay with an empty lower layer
  </text>

  <!-- ── BOTTOM CAPTION ─────────────────────────────────────────────── -->
  <text x="245" y="800" text-anchor="middle" font-size="11" fill="#7e8794" font-style="italic">five tiers · top = strongest · grouped by who reads them</text>
  <text x="604" y="800" text-anchor="middle" font-size="11" fill="#7e8794" font-style="italic">workspace + profiles + personal deep-merge by tier order</text>
  <text x="1005" y="800" text-anchor="middle" font-size="11" fill="#7e8794" font-style="italic">SDK reads composed user tier + workdir; auth injected at spawn</text>
</svg>
